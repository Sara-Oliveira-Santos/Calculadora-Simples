<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="index.css"/>
</head>
<body>
    <div id="calculadora">
        <form name="form">
            <input type="text" id="visor">
        </form>
        <table id="teclado">
            <thead>
                <tr>
                    <td colspan="2">
                        <input type="button" id="limparTudo" value="C">
                    </td>
                    <td>
                        <input type="button" id="limparUltimoNum" value="⌫">
                    </td>
                    <td>
                    <input type="button" class="operador"  value="+">
                </td>
                </tr>
            </thead>
            <tr>
                <td>
                    <input type="button" class="numero"  value="7">
                </td>
                <td>
                    <input type="button" class="numero"  value="8">
                </td>
                <td>
                    <input type="button" class="numero"  value="9">
                </td>
                <td>
                    <input type="button" class="operador" value="-">
                </td>
            </tr>
            <tr>
                <td>
                    <input type="button" class="numero"  value="4">
                </td>
                <td>
                    <input type="button" class="numero"  value="5">
                </td>
                <td>
                    <input type="button" class="numero" value="6">
                </td>
                <td>
                    <input type="button" class="operador"  value="*">
                </td>
            </tr>
            <tr>
                <td>
                    <input type="button" class="numero" value="1">
                </td>
                <td>
                    <input type="button" class="numero"  value="2">
                </td>
                <td>
                    <input type="button" class="numero" value="3">
                </td>
                <td>
                        <input type="button" class="operador" value="/">
                    </td>
            </tr>
            <tfoot>
                <tr>
                    <td>
                        <input type="button"  value="">
                    </td>
                    <td>
                        <input type="button" class="numero"  value="0">
                    </td>
                    <td>
                        <input type="button" class="operador"  value=".">
                    </td>
                    <td>
                        <input type="button"  id="igual" value="=">
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>
</body>
<script src="index.js"></script>
</html>
